<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Eat | 15道學生低碳食譜</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --green: #3d7a35;
            --green-dark: #2d5a27;
            --cream: #faf6eb;
            --warm: #fff8e7;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: linear-gradient(160deg, #faf6eb 0%, #e8f4e5 45%, #faf6eb 100%);
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            color: #333;
        }

        .navbar {
            background: linear-gradient(90deg, #2d5a27, #4a8f3f) !important;
            padding: 0.9rem 0;
        }

        .navbar-brand { font-size: 1.35rem; letter-spacing: 0.5px; }

        .hero-section {
            padding: 3.5rem 1rem 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: "🌱";
            position: absolute;
            font-size: 7rem;
            opacity: 0.07;
            top: -10px;
            left: 8%;
            transform: rotate(-15deg);
        }

        .hero-section::after {
            content: "🥗";
            position: absolute;
            font-size: 5rem;
            opacity: 0.07;
            bottom: 0;
            right: 10%;
            transform: rotate(12deg);
        }

        .hero-title {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            color: var(--green-dark);
            margin-bottom: 0.75rem;
        }

        .hero-sub {
            color: #666;
            max-width: 520px;
            margin: 0 auto 1.8rem;
            line-height: 1.7;
        }

        .filter-wrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
        }

        .filter-btn {
            border: none;
            background: white;
            color: var(--green-dark);
            padding: 0.55rem 1.1rem;
            border-radius: 999px;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(45, 90, 39, 0.1);
            transition: transform 0.2s, background 0.2s, color 0.2s;
            cursor: pointer;
        }

        .filter-btn:hover { transform: translateY(-2px) scale(1.03); }
        .filter-btn.active {
            background: var(--green-dark);
            color: white;
            transform: translateY(-1px);
        }

        .recipe-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            height: 100%;
            background: white;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .recipe-card:hover {
            transform: translateY(-6px) rotate(-0.5deg);
            box-shadow: 0 14px 28px rgba(45, 90, 39, 0.15);
        }

        .recipe-card.br { border-top: 4px solid #f4b942; }
        .recipe-card.lu { border-top: 4px solid #5cb85c; }
        .recipe-card.di { border-top: 4px solid #7b6ba8; }

        .card-img-top {
            height: 170px;
            object-fit: cover;
            background: linear-gradient(135deg, #eee, #f5f5f5);
        }

        .card-body { padding: 1rem !important; text-align: center; }

        .time-badge {
            display: inline-block;
            background: #eef8ec;
            color: var(--green-dark);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
        }

        .card-title-text {
            font-weight: 700;
            margin: 0.5rem 0 0;
            font-size: 0.95rem;
            color: #2a2a2a;
        }

        .recipe-item { transition: opacity 0.25s, transform 0.25s; }
        .recipe-item.is-hidden {
            display: none;
        }

        /* 自訂彈窗 — 不依賴 Bootstrap Modal，關閉一定有效 */
        .recipe-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 40, 18, 0.45);
            backdrop-filter: blur(4px);
            z-index: 1050;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }

        .recipe-overlay.show { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .recipe-panel {
            background: white;
            border-radius: 22px;
            width: 100%;
            max-width: 440px;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.25s ease;
            position: relative;
        }

        .panel-header {
            background: linear-gradient(135deg, #2d5a27, #4a8f3f);
            color: white;
            padding: 1.1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .panel-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .panel-close {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
        }

        .panel-close:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: rotate(90deg);
        }

        .panel-body {
            padding: 1.25rem 1.4rem 1.5rem;
            overflow-y: auto;
            max-height: calc(85vh - 64px);
        }

        .panel-body h6 {
            color: var(--green-dark);
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .panel-body p {
            margin-bottom: 1rem;
            line-height: 1.75;
            color: #444;
            white-space: pre-line;
        }

        .panel-back {
            display: block;
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.65rem;
            border: none;
            border-radius: 12px;
            background: #eef8ec;
            color: var(--green-dark);
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .panel-back:hover { background: #dcefd8; }

        footer {
            background: #1e2e1c;
            color: white;
            text-align: center;
            padding: 2.5rem 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🌿 Eco-Eat</a>
            <div class="ms-auto text-white d-none d-md-block small opacity-75">SDG 13 · 低碳飲食</div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <h1 class="hero-title">學生蔬食，15 分鐘守護地球 🌍</h1>
            <p class="hero-sub">點卡片看做法，做完記得按 ✕ 或「回到食譜列表」回主畫面。畜牧業排放占全球溫室氣體近 14.5%，一起試試看！</p>

            <div class="filter-wrap">
                <button class="filter-btn active" onclick="filterMenu('all', this)">🍽️ 全部</button>
                <button class="filter-btn" onclick="filterMenu('br', this)">🌅 早餐</button>
                <button class="filter-btn" onclick="filterMenu('lu', this)">☀️ 午餐</button>
                <button class="filter-btn" onclick="filterMenu('di', this)">🌙 晚餐</button>
            </div>
        </div>
    </section>

    <div class="container py-4 pb-5">
        <div class="row g-4" id="recipe-container"></div>
    </div>

    <!-- 單一彈窗，內容動態填入 -->
    <div class="recipe-overlay" id="recipe-overlay" onclick="onOverlayClick(event)">
        <div class="recipe-panel" onclick="event.stopPropagation()">
            <div class="panel-header">
                <h5 class="panel-title" id="panel-title">食譜</h5>
                <button type="button" class="panel-close" onclick="closeRecipe()" aria-label="關閉">✕</button>
            </div>
            <div class="panel-body">
                <h6>🥗 所需食材</h6>
                <p id="panel-ingredients"></p>
                <h6>🔥 製作步驟</h6>
                <p id="panel-steps"></p>
                <button type="button" class="panel-back" onclick="closeRecipe()">← 回到食譜列表</button>
            </div>
        </div>
    </div>

    <footer>
        <h5 class="mb-2">About Eco-Eat & SDG 13</h5>
        <p class="small text-white-50 mb-3 px-3">推廣永續飲食，減少肉類攝取、降低環境足跡。</p>
        <p class="mb-0 small">© 2026 Eco-Eat Project | 113403504 李盈萱</p>
    </footer>

    <script>
        const recipes = [
            {
                id: '1', cat: 'br', title: '隔燕麥粥', time: '5m', img: 'oats.jpg',
                ingredients: '燕麥片 ½ 杯、無糖豆漿 ½ 杯、奇亞籽 1 小匙、香蕉或藍莓適量',
                steps: '1. 取一個有蓋的玻璃罐或保鮮盒，倒入燕麥片與豆漿，比例約 1:1。\n2. 加入奇亞籽攪拌均勻，蓋上蓋子後放入冰箱冷藏至少 6 小時（建議睡前準備，隔天早上食用）。\n3. 取出後若太稠，可再補一點豆漿調整濃稠度。\n4. 切好香蕉片或洗淨莓果鋪在上方，即可直接冷食，不必再加熱。'
            },
            {
                id: '2', cat: 'br', title: '酪梨全麥吐司', time: '8m', img: 'avocado.jpg',
                ingredients: '全麥吐司 2 片、熟酪梨 ½ 顆、海鹽少許、現磨黑胡椒少許、檸檬汁幾滴（可選）',
                steps: '1. 全麥吐司放入烤吐司機或干鍋，以中小火烤至表面微焦、邊緣酥脆。\n2. 熟酪梨對半切開，去籽後用叉子壓成泥，可加幾滴檸檬汁防止氧化變黑。\n3. 將酪梨泥均勻塗抹在吐司上，厚度可依喜好調整。\n4. 撒上少許海鹽與現磨黑胡椒提味，即可切半食用。'
            },
            {
                id: '3', cat: 'br', title: '香蕉豆奶飲', time: '3m', img: 'smoothie.jpg',
                ingredients: '香蕉 1 根（約 120g）、無糖豆漿 300ml、冰塊 3～4 顆（可選）',
                steps: '1. 香蕉剝皮後切約 2 公分小段，方便果汁機打勻。\n2. 將香蕉、豆漿（與冰塊）依序放入果汁機或調理杯。\n3. 高速攪打 30～45 秒，至完全沒有顆粒、口感綿密。\n4. 立即倒入杯中飲用，避免放置過久分層；若太稠可再加 50ml 豆漿調稀。'
            },
            {
                id: '4', cat: 'br', title: '堅果豆乳優格', time: '5m', img: 'yogurt.jpg',
                ingredients: '無糖植物優格 1 杯（200g）、綜合堅果 2 大匙、蜂蜜或楓糖 1 小匙',
                steps: '1. 取一個碗，倒入冷藏過的植物優格。\n2. 綜合堅果稍微切碎或直接整顆使用，均勻撒在優格表面。\n3. 以小匙淋上蜂蜜，由外圈往內圈畫圈，方便每一口都有甜度。\n4. 若喜歡更豐富口感，可再加幾顆新鮮莓果，攪拌後即可享用。'
            },
            {
                id: '5', cat: 'br', title: '藍莓果醬貝果', time: '5m', img: 'bagel.jpg',
                ingredients: '全麥或原味貝果 1 個、藍莓果醬 2～3 大匙',
                steps: '1. 貝果橫切成上下兩片，若偏硬可先以烤吐司機或烤箱 180°C 烤 3 分鐘。\n2. 烤至外層微脆、內裡仍柔軟即可取出，避免烤過頭。\n3. 在切面朝上均勻塗抹藍莓果醬，厚度可依個人喜好調整。\n4. 合起或直接分開食用皆可，建議現做現吃以保持酥脆口感。'
            },
            {
                id: '6', cat: 'lu', title: '番茄涼拌嫩豆腐', time: '10m', img: 'tofu.jpg',
                ingredients: '嫩豆腐 1 盒（300g）、牛番茄 1 顆、和風醬或薄鹽醬油 1.5 大匙、蔥花少許',
                steps: '1. 嫩豆腐開盒後倒去多餘水分，可墊廚房紙巾輕壓 1 分鐘。\n2. 整盒豆腐倒扣入盤，或切約 3 公分方塊後擺盤。\n3. 番茄洗淨去蒂，切小丁後鋪在豆腐上。\n4. 淋上和風醬或薄鹽醬油，最後撒上蔥花，冷藏 5 分鐘後食用風味更佳。'
            },
            {
                id: '7', cat: 'lu', title: '胡麻全麥冷麵', time: '12m', img: 'soba.jpg',
                ingredients: '全麥麵 1 束（100g）、小黃瓜 ½ 根、胡麻醬 2 大匙、白芝麻少許',
                steps: '1. 鍋中煮滾水，下全麥麵以中火煮約 6～8 分鐘至彈牙口感，依包裝說明調整時間。\n2. 撈起麵條立刻以冷水沖洗 2～3 次，並用冰水浸泡 1 分鐘，瀝乾備用。\n3. 小黃瓜洗淨切絲，舖在麵上或與麵拌在一起。\n4. 淋上胡麻醬充分拌勻，若太稠可加 1～2 大匙冷水稀釋，起鍋前撒白芝麻即可。'
            },
            {
                id: '8', cat: 'lu', title: '鷹嘴豆輕食捲', time: '10m', img: 'wrap.jpg',
                ingredients: '全麥墨西哥餅皮 1 片、鷹嘴豆泥 3 大匙、生菜 2 片、小番茄 3 顆（可選）',
                steps: '1. 平底鍋以干鍋或小火不加油，將餅皮每面烘 20～30 秒至微軟、略帶焦斑。\n2. 餅皮平鋪，中央塗抹鷹嘴豆泥，邊緣留 2 公分方便捲起。\n3. 放上洗淨瀝干的生菜，可再加切半的小番茄增加水分。\n4. 由下方往上捲緊，左右折入後繼續捲成長卷，斜切對半即可食用。'
            },
            {
                id: '9', cat: 'lu', title: '微波豆腐味噌湯', time: '15m', img: 'miso.jpg',
                ingredients: '味噌 1.5 大匙、嫩豆腐 ½ 盒、海帶芽 1 小把、蔥花少許、熱水 400ml',
                steps: '1. 取可微波的湯碗，加入約 400ml 熱水（或常溫水微波後使用）。\n2. 豆腐切小方塊，與海帶芽一同放入碗中，微波中火 2 分鐘。\n3. 取出後先取少量湯汁將味噌化開，再倒回碗中攪拌，避免味噌直接高溫煮開失去風味。\n4. 撒上蔥花，試味道後即可飲用；若偏鹹可再加少許熱水調整。'
            },
            {
                id: '10', cat: 'lu', title: '黑胡椒毛豆餐', time: '5m', img: 'edamame.jpg',
                ingredients: '冷凍毛豆 200g、粗海鹽 ½ 小匙、現磨黑胡椒 ¼ 小匙',
                steps: '1. 冷凍毛豆不必完全解凍，直接放入滾水中煮 3～4 分鐘至熟透。\n2. 撈起瀝乾水分，可再用廚房紙巾吸去表面水氣。\n3. 趁熱加入粗海鹽與現磨黑胡椒，在碗中上下拋拌 30 秒讓調味均勻附著。\n4. 放涼 1 分鐘後即可當輕食或配菜，剩餘可冷藏當隔日點心。'
            },
            {
                id: '11', cat: 'di', title: '10分鐘溫沙拉', time: '10m', img: 'salad.jpg',
                ingredients: '花椰菜 ½ 顆、玉米筍 5 根、橄欖油 1 大匙、鹽與黑胡椒各少許',
                steps: '1. 花椰菜切小朵、玉米筍斜切段，洗淨後瀝干。\n2. 平底鍋倒入橄欖油，中火熱鍋後先下花椰菜拌炒 2 分鐘。\n3. 加入玉米筍續炒 2 分鐘，再倒 2 大匙水，蓋鍋悶 2 分鐘至蔬菜微軟仍保有脆度。\n4. 開蓋後以鹽、黑胡椒調味，翻拌均勻即可起鍋，趁溫熱食用。'
            },
            {
                id: '12', cat: 'di', title: '南瓜椰奶燉菜', time: '15m', img: 'pumpkin.jpg',
                ingredients: '南瓜塊 300g、椰奶 200ml、咖哩粉 1 小匙、鹽少許',
                steps: '1. 南瓜去皮切約 3 公分塊，若時間緊可先微波 3 分鐘加速軟化。\n2. 小湯鍋加入少量水（約 100ml），放入南瓜以中火煮 5～7 分鐘至叉子可輕易戳入。\n3. 倒入椰奶與咖哩粉，轉小火邊煮邊攪拌，避免椰奶糊底。\n4. 煮至湯汁略為濃稠、南瓜完整但入口即化，以鹽調味後即可起鍋。'
            },
            {
                id: '13', cat: 'di', title: '蒜香野菇麵', time: '15m', img: 'pasta.jpg',
                ingredients: '義大利麵 100g、鮮香菇 4 朵、蒜末 2 瓣、橄欖油 2 大匙、鹽與黑胡椒少許',
                steps: '1. 大鍋煮滾加鹽的水，下義大利麵依包裝時間煮約 8～10 分鐘，保留 ½ 杯麵水。\n2. 另起平底鍋以中大火熱橄欖油，下蒜末炒至金黃出香味，注意勿焦苦。\n3. 香菇切片入鍋，炒 3 分鐘至出水略縮，以鹽、胡椒調味。\n4. 將瀝乾的麵條放入鍋中，加入 2～3 大匙麵水快速拌炒 1 分鐘，讓醬汁附著後即可盛盤。'
            },
            {
                id: '14', cat: 'di', title: '彩椒炒豆乾', time: '12m', img: 'tofu2.jpg',
                ingredients: '彩椒 1 顆（紅黃各半）、豆乾 2 片、素蠔油 1 大匙、蒜末 1 瓣',
                steps: '1. 豆乾切約 0.5 公分寬條，彩椒去籽切菱形片，蒜切末備用。\n2. 平底鍋加 1 大匙油，中大火下豆乾煎至兩面金黃微焦，約 3 分鐘。\n3. 加入蒜末與彩椒，大火快炒 2 分鐘，保持彩椒爽脆。\n4. 沿鍋邊淋入素蠔油，快速翻拌 30 秒讓醬汁包覆，即可起鍋配飯。'
            },
            {
                id: '15', cat: 'di', title: '韓式辣拌時蔬豆腐', time: '10m', img: 'korean.jpg',
                ingredients: '板豆腐 1 盒、韓式辣醬 1.5 大匙、豆芽 1 把、白芝麻 1 小匙、芝麻油 ½ 小匙',
                steps: '1. 板豆腐切約 2 公分方塊，滾水中汆燙 2 分鐘後撈起瀝干，可去豆腥並定型。\n2. 豆芽洗淨，同鍋快速汆燙 30 秒後瀝干，保持爽脆口感。\n3. 取大碗放入豆腐與豆芽，加入韓式辣醬、芝麻油充分拌勻。\n4. 裝盤後撒上白芝麻，靜置 2 分鐘讓味道滲入，即可當主菜或配白飯食用。'
            }
        ];

        const overlay = document.getElementById('recipe-overlay');

        function renderRecipes() {
            document.getElementById('recipe-container').innerHTML = recipes.map(r => `
                <div class="col-6 col-md-4 col-lg-3 recipe-item ${r.cat}" data-cat="${r.cat}">
                    <div class="card recipe-card ${r.cat}" onclick="openRecipe('${r.id}')">
                        <img src="./images/${r.img}" class="card-img-top" alt="${r.title}"
                             onerror="this.style.objectFit='contain';this.style.padding='2rem';this.alt='${r.title}'">
                        <div class="card-body">
                            <span class="time-badge">⏱ ${r.time}</span>
                            <p class="card-title-text">${r.title}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openRecipe(id) {
            const r = recipes.find(x => x.id === id);
            if (!r) return;
            document.getElementById('panel-title').textContent = '🍳 ' + r.title;
            document.getElementById('panel-ingredients').textContent = r.ingredients;
            document.getElementById('panel-steps').textContent = r.steps;
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeRecipe() {
            overlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        function onOverlayClick(e) {
            if (e.target === overlay) closeRecipe();
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.recipe-item').forEach(item => {
                item.classList.toggle('is-hidden', cat !== 'all' && !item.classList.contains(cat));
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('show')) closeRecipe();
        });

        renderRecipes();
    </script>
</body>
</html>
