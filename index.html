<!DOCTYPE html>
<!--
  Eco-Eat 學生低碳食譜網站
  ─────────────────────────
  專案說明：以單頁式網站（Single Page）展示 15 道 15 分鐘內可完成的蔬食食譜，
           呼應 SDG 13 氣候行動，推廣低碳飲食。
  技術架構：HTML + CSS + 原生 JavaScript（Vanilla JS）
           Bootstrap 5 僅用於 RWD 格線排版（container / row / col）
  作者：113403504 李盈萱
-->
<html lang="zh-Hant">
<head>
    <!-- 基本 meta：編碼、RWD 視窗設定、頁面標題 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Eat | 15道學生低碳食譜</title>

    <!-- Bootstrap CSS：提供響應式 12 欄格線系統，卡片區塊會用到 col-* 類別 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ── 全站色彩變數 ──
           集中管理主色，之後若要換色系只需改 :root 即可 */
        :root {
            --green: #3d7a35;       /* 輔助綠色 */
            --green-dark: #2d5a27;  /* 主色：深森林綠 */
            --cream: #faf6eb;       /* 背景米白 */
            --warm: #fff8e7;        /* 暖色點綴（保留供延伸使用） */
        }

        /* 統一 box-sizing，避免 padding 撐破寬度 */
        * { box-sizing: border-box; }

        body {
            margin: 0;
            /* 淡綠漸層背景，營造自然、輕鬆的視覺氛圍 */
            background: linear-gradient(160deg, #faf6eb 0%, #e8f4e5 45%, #faf6eb 100%);
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            color: #333;
        }

        /* ── 頂部導覽列 ── */
        .navbar {
            background: linear-gradient(90deg, #2d5a27, #4a8f3f) !important;
            padding: 0.9rem 0;
        }

        .navbar-brand { font-size: 1.35rem; letter-spacing: 0.5px; }

        /* ── Hero 主視覺區 ── */
        .hero-section {
            padding: 3.5rem 1rem 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 用偽元素放大型 emoji 當背景裝飾，opacity 很低不搶視覺焦點 */
        .hero-section::before {
            content: "🌱";
            position: absolute;
            font-size: 7rem;
            opacity: 0.07;
            top: -10px;
            left: 8%;
            transform: rotate(-15deg);
        }

        .hero-section::after {
            content: "🥗";
            position: absolute;
            font-size: 5rem;
            opacity: 0.07;
            bottom: 0;
            right: 10%;
            transform: rotate(12deg);
        }

        /* clamp() 讓標題在不同螢幕寬度自動縮放 */
        .hero-title {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            color: var(--green-dark);
            margin-bottom: 0.75rem;
        }

        .hero-sub {
            color: #666;
            max-width: 520px;
            margin: 0 auto 1.8rem;
            line-height: 1.7;
        }

        /* ── 分類篩選按鈕 ── */
        .filter-wrap {
            display: flex;
            flex-wrap: wrap;          /* 手機版按鈕過多時自動換行 */
            justify-content: center;
            gap: 0.6rem;
        }

        .filter-btn {
            border: none;
            background: white;
            color: var(--green-dark);
            padding: 0.55rem 1.1rem;
            border-radius: 999px;     /* 圓 pill 造型 */
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(45, 90, 39, 0.1);
            transition: transform 0.2s, background 0.2s, color 0.2s;
            cursor: pointer;
        }

        .filter-btn:hover { transform: translateY(-2px) scale(1.03); }

        /* .active 由 JavaScript 切換，代表目前選中的分類 */
        .filter-btn.active {
            background: var(--green-dark);
            color: white;
            transform: translateY(-1px);
        }

        /* ── 食譜卡片 ── */
        .recipe-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            height: 100%;             /* 同一列卡片等高 */
            background: white;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        /* hover 微上浮 + 輕微旋轉，增加互動感 */
        .recipe-card:hover {
            transform: translateY(-6px) rotate(-0.5deg);
            box-shadow: 0 14px 28px rgba(45, 90, 39, 0.15);
        }

        /* 早/午/晚餐以頂部色條區分：br=早餐、lu=午餐、di=晚餐 */
        .recipe-card.br { border-top: 4px solid #f4b942; }
        .recipe-card.lu { border-top: 4px solid #5cb85c; }
        .recipe-card.di { border-top: 4px solid #7b6ba8; }

        .card-img-top {
            height: 170px;
            object-fit: cover;        /* 裁切填滿，維持卡片整齊 */
            background: linear-gradient(135deg, #eee, #f5f5f5);
        }

        .card-body { padding: 1rem !important; text-align: center; }

        .time-badge {
            display: inline-block;
            background: #eef8ec;
            color: var(--green-dark);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
        }

        .card-title-text {
            font-weight: 700;
            margin: 0.5rem 0 0;
            font-size: 0.95rem;
            color: #2a2a2a;
        }

        /* 篩選時隱藏不符合分類的卡片（由 JS 加上 .is-hidden） */
        .recipe-item { transition: opacity 0.25s, transform 0.25s; }
        .recipe-item.is-hidden { display: none; }

        /* ── 自訂食譜彈窗（Overlay Modal）──
           不使用 Bootstrap Modal，避免動態產生 15 個彈窗時關閉失效。
           改為「單一彈窗 + JS 動態換內容」的作法。 */
        .recipe-overlay {
            position: fixed;          /* 固定於視窗，蓋住整個畫面 */
            inset: 0;                 /* top/right/bottom/left 全為 0 */
            background: rgba(20, 40, 18, 0.45);
            backdrop-filter: blur(4px);
            z-index: 1050;
            display: none;            /* 預設隱藏，.open 時改 flex 置中 */
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }

        .recipe-overlay.show { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .recipe-panel {
            background: white;
            border-radius: 22px;
            width: 100%;
            max-width: 440px;
            max-height: 85vh;         /* 不超過視窗高度 85%，避免小螢幕溢出 */
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.25s ease;
            position: relative;
        }

        .panel-header {
            background: linear-gradient(135deg, #2d5a27, #4a8f3f);
            color: white;
            padding: 1.1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .panel-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .panel-close {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
        }

        .panel-close:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: rotate(90deg);
        }

        .panel-body {
            padding: 1.25rem 1.4rem 1.5rem;
            overflow-y: auto;         /* 步驟太長時可捲動 */
            max-height: calc(85vh - 64px);
        }

        .panel-body h6 {
            color: var(--green-dark);
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .panel-body p {
            margin-bottom: 1rem;
            line-height: 1.75;
            color: #444;
            white-space: pre-line;    /* 保留 steps 字串中的 \n 換行 */
        }

        .panel-back {
            display: block;
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.65rem;
            border: none;
            border-radius: 12px;
            background: #eef8ec;
            color: var(--green-dark);
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .panel-back:hover { background: #dcefd8; }

        footer {
            background: #1e2e1c;
            color: white;
            text-align: center;
            padding: 2.5rem 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <!-- ══════════════════════════════════════
         區塊 1：頂部導覽列（Navbar）
         sticky-top 讓使用者捲動時仍看得到品牌名稱
         ══════════════════════════════════════ -->
    <nav class="navbar navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🌿 Eco-Eat</a>
            <div class="ms-auto text-white d-none d-md-block small opacity-75">SDG 13 · 低碳飲食</div>
        </div>
    </nav>

    <!-- ══════════════════════════════════════
         區塊 2：Hero 主視覺 + 分類篩選
         ══════════════════════════════════════ -->
    <section class="hero-section">
        <div class="container">
            <h1 class="hero-title">學生蔬食，15 分鐘守護地球 🌍</h1>
            <p class="hero-sub">點卡片看做法，做完記得按 ✕ 或「回到食譜列表」回主畫面。畜牧業排放占全球溫室氣體近 14.5%，一起試試看！</p>

            <!-- 篩選按鈕：onclick 呼叫 filterMenu(分類代碼, 被點擊的按鈕元素) -->
            <div class="filter-wrap">
                <button class="filter-btn active" onclick="filterMenu('all', this)">🍽️ 全部</button>
                <button class="filter-btn" onclick="filterMenu('br', this)">🌅 早餐</button>
                <button class="filter-btn" onclick="filterMenu('lu', this)">☀️ 午餐</button>
                <button class="filter-btn" onclick="filterMenu('di', this)">🌙 晚餐</button>
            </div>
        </div>
    </section>

    <!-- ══════════════════════════════════════
         區塊 3：食譜卡片列表（由 JavaScript 動態插入）
         #recipe-container 初始為空，頁面載入後由 renderRecipes() 填入
         ══════════════════════════════════════ -->
    <div class="container py-4 pb-5">
        <div class="row g-4" id="recipe-container"></div>
    </div>

    <!-- ══════════════════════════════════════
         區塊 4：食譜詳情彈窗（全站共用一個）
         - 點卡片 → openRecipe() 填入標題、食材、步驟
         - 關閉方式：✕ 按鈕 / 回到列表 / 點背景 / 按 Esc
         - recipe-panel 上的 stopPropagation 防止點面板內部時誤關閉
         ══════════════════════════════════════ -->
    <div class="recipe-overlay" id="recipe-overlay" onclick="onOverlayClick(event)">
        <div class="recipe-panel" onclick="event.stopPropagation()">
            <div class="panel-header">
                <h5 class="panel-title" id="panel-title">食譜</h5>
                <button type="button" class="panel-close" onclick="closeRecipe()" aria-label="關閉">✕</button>
            </div>
            <div class="panel-body">
                <h6>🥗 所需食材</h6>
                <p id="panel-ingredients"></p>
                <h6>🔥 製作步驟</h6>
                <p id="panel-steps"></p>
                <button type="button" class="panel-back" onclick="closeRecipe()">← 回到食譜列表</button>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         區塊 5：頁尾 Footer
         ══════════════════════════════════════ -->
    <footer>
        <h5 class="mb-2">About Eco-Eat & SDG 13</h5>
        <p class="small text-white-50 mb-3 px-3">推廣永續飲食，減少肉類攝取、降低環境足跡。</p>
        <p class="mb-0 small">© 2026 Eco-Eat Project | 113403504 李盈萱</p>
    </footer>

    <script>
        /*
         * ── 食譜資料陣列 ──
         * 每筆物件欄位說明：
         *   id          : 唯一識別碼（字串），供 openRecipe() 查找
         *   cat         : 分類代碼 → br=早餐 / lu=午餐 / di=晚餐
         *   title       : 食譜名稱（顯示於卡片與彈窗標題）
         *   time        : 預估料理時間（顯示於卡片徽章）
         *   img         : 圖片檔名，路徑為 ./images/{img}
         *   ingredients : 食材列表（純文字）
         *   steps       : 製作步驟，以 \n 分隔每一個步驟
         */
        const recipes = [
            // ── 早餐 br（5 道）──
            {
                id: '1', cat: 'br', title: '隔燕麥粥', time: '5m', img: 'oats.jpg',
                ingredients: '燕麥片 ½ 杯、無糖豆漿 ½ 杯、奇亞籽 1 小匙、香蕉或藍莓適量',
                steps: '【準備】取有蓋玻璃罐或保鮮盒，量好燕麥片 ½ 杯與無糖豆漿 ½ 杯。\n1. 將燕麥片倒入容器中，加入豆漿，比例約 1:1；若喜歡稀一點可多加 1～2 大匙豆漿。\n2. 加入奇亞籽 1 小匙，用湯匙充分攪拌 30 秒，確保奇亞籽分散不結塊。\n3. 蓋緊盒蓋，貼上標籤註記日期，放入冰箱冷藏至少 6 小時（建議睡前製作，隔天早餐食用）。\n4. 隔天取出，若質地太稠，可再補 1～2 大匙豆漿攪拌至喜歡的濃度。\n5. 香蕉剝皮切 0.5 公分厚片，或將藍莓洗淨瀝干，均勻鋪在燕麥上方。\n6. 可直接冷食，不必加熱；若腸胃較敏感，可微波 30 秒至微溫後食用。\n【小提示】奇亞籽會吸水膨脹，冷藏越久口感越綿密。'
            },
            {
                id: '2', cat: 'br', title: '酪梨全麥吐司', time: '8m', img: 'avocado.jpg',
                ingredients: '全麥吐司 2 片、熟酪梨 ½ 顆、海鹽少許、現磨黑胡椒少許、檸檬汁幾滴（可選）',
                steps: '【準備】選擇表皮深綠、按壓略軟的熟酪梨；全麥吐司置室溫回軟。\n1. 全麥吐司放入烤吐司機，烤 2～3 分鐘至表面微焦、邊緣酥脆；若用干鍋，中小火每面烤 1～2 分鐘。\n2. 熟酪梨對半切開，去除中央大籽，用叉子在果肉上輕壓成泥，保留些許顆粒感。\n3. 擠入 2～3 滴檸檬汁拌入酪梨泥，可防止氧化變黑並增加清爽酸度。\n4. 將酪梨泥均勻塗抹在吐司切面上，厚度約 0.5 公分，邊緣可略薄。\n5. 依個人喜好撒上少許海鹽與現磨黑胡椒；可加幾滴橄欖油或紅辣椒片增添風味。\n6. 對切或直接整片食用，建議現做現吃，避免吐司受潮變軟。\n【小提示】酪梨未熟可與蘋果同袋密封 1～2 天催熟。'
            },
            {
                id: '3', cat: 'br', title: '香蕉豆奶飲', time: '3m', img: 'smoothie.jpg',
                ingredients: '香蕉 1 根（約 120g）、無糖豆漿 300ml、冰塊 3～4 顆（可選）',
                steps: '【準備】香蕉選表皮帶斑點的，甜度較高；豆漿建議使用冰豆漿，成品更清涼。\n1. 香蕉剝皮，切約 2 公分小段，方便果汁機刀片抓取。\n2. 將香蕉段放入果汁機或調理杯，倒入無糖豆漿 300ml。\n3. 若喜歡冰涼口感，加入冰塊 3～4 顆；不加冰塊則口感較濃稠。\n4. 蓋緊杯蓋，高速攪打 30～45 秒，中途可暫停刮下杯壁殘留，再打至完全綿密無顆粒。\n5. 打開杯蓋試味道，若太稠可加 30～50ml 豆漿或冷水調稀。\n6. 立即倒入杯中飲用，避免久置分層；若需外帶，搖匀後 30 分鐘內喝完風味最佳。\n【小提示】可加 ½ 小匙可可粉或 1 小匙花生醬變化口味。'
            },
            {
                id: '4', cat: 'br', title: '堅果豆乳優格', time: '5m', img: 'yogurt.jpg',
                ingredients: '無糖植物優格 1 杯（200g）、綜合堅果 2 大匙、蜂蜜或楓糖 1 小匙',
                steps: '【準備】植物優格提前從冰箱取出 5 分鐘，略回溫口感較滑順；堅果可依喜好選擇。\n1. 取一個深碗，倒入無糖植物優格 200g，用湯匙稍微抹平表面。\n2. 綜合堅果若顆粒較大，可用刀背稍微壓碎，保留適當口感。\n3. 將堅果均勻撒在優格表面，約 2 大匙，避免堆在一角。\n4. 蜂蜜或楓糖 1 小匙，由外圈往內圈畫圈淋上，讓每一口都能沾到甜度。\n5. 可再加洗淨的草莓、藍莓或切片香蕉，增加水分與維生素。\n6. 用湯匙由底部向上輕拌 2～3 下即可享用，避免過度攪拌使優格變稀。\n【小提示】無蜂蜜可用龍舌蘭糖漿或無糖果醬代替。'
            },
            {
                id: '5', cat: 'br', title: '藍莓果醬貝果', time: '5m', img: 'bagel.jpg',
                ingredients: '全麥或原味貝果 1 個、藍莓果醬 2～3 大匙',
                steps: '【準備】貝果若從冷藏取出，可先室溫放置 10 分鐘回軟。\n1. 貝果以水平方向橫切成上下兩片，厚度約 1.5 公分，切刀建議用鋸齒刀以免壓扁。\n2. 若貝果偏硬，放入烤吐司機或烤箱 180°C 烤 3 分鐘，至外層微脆、內裡仍柔軟。\n3. 取出後稍放 30 秒散熱，避免過燙時塗抹果醬會融化過快。\n4. 在兩片貝果的切面朝上，各塗抹藍莓果醬 1～1.5 大匙，厚度依個人喜好調整。\n5. 可將兩片合起對切，或直接分開食用；也可只塗單面降低甜度。\n6. 建議現做現吃，放久後貝果會回軟，口感較不酥脆。\n【小提示】可搭配無鹽奶油或奶油起司先薄塗一層，再抹果醬風味更豐富。'
            },

            // ── 午餐 lu（5 道）──
            {
                id: '6', cat: 'lu', title: '番茄涼拌嫩豆腐', time: '10m', img: 'tofu.jpg',
                ingredients: '嫩豆腐 1 盒（300g）、牛番茄 1 顆、和風醬或薄鹽醬油 1.5 大匙、蔥花少許',

        /* 快取彈窗 DOM 節點，避免每次開關都重複 querySelector */
        const overlay = document.getElementById('recipe-overlay');

        /**
         * renderRecipes — 動態產生食譜卡片 HTML
         * 使用 Array.map() 將 recipes 陣列轉成 HTML 字串，
         * 再一次性寫入 #recipe-container（比 document.write 更現代、不阻塞解析）。
         *
         * 響應式欄位：
         *   col-6      → 手機每列 2 張
         *   col-md-4   → 平板每列 3 張
         *   col-lg-3   → 桌面每列 4 張
         */
        function renderRecipes() {
            document.getElementById('recipe-container').innerHTML = recipes.map(r => `
                <div class="col-6 col-md-4 col-lg-3 recipe-item ${r.cat}" data-cat="${r.cat}">
                    <div class="card recipe-card ${r.cat}" onclick="openRecipe('${r.id}')">
                        <img src="./images/${r.img}" class="card-img-top" alt="${r.title}"
                             onerror="this.style.objectFit='contain';this.style.padding='2rem';this.alt='${r.title}'">
                        <div class="card-body">
                            <span class="time-badge">⏱ ${r.time}</span>
                            <p class="card-title-text">${r.title}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /**
         * openRecipe — 開啟食譜詳情彈窗
         * @param {string} id - 食譜 id（如 '1'、'15'）
         *
         * 流程：依 id 查找資料 → 填入彈窗各欄位 → 顯示 overlay → 鎖住背景捲動
         */
        function openRecipe(id) {
            const r = recipes.find(x => x.id === id);
            if (!r) return;  // 找不到資料時安全退出，避免報錯

            document.getElementById('panel-title').textContent = '🍳 ' + r.title;
            document.getElementById('panel-ingredients').textContent = r.ingredients;
            document.getElementById('panel-steps').textContent = r.steps;

            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';  // 防止彈窗開啟時背景仍可捲動
        }

        /**
         * closeRecipe — 關閉食譜彈窗，回到主畫面
         * 移除 .show 類別隱藏 overlay，並恢復 body 捲動
         */
        function closeRecipe() {
            overlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        /**
         * onOverlayClick — 點擊彈窗「背景遮罩」時關閉
         * 只有 e.target 恰好是 overlay 本身才關閉（點面板內部不觸發）
         * @param {MouseEvent} e
         */
        function onOverlayClick(e) {
            if (e.target === overlay) closeRecipe();
        }

        /**
         * filterMenu — 依分類篩選食譜卡片
         * @param {string} cat  - 分類代碼：'all' | 'br' | 'lu' | 'di'
         * @param {HTMLElement} btn - 被點擊的篩選按鈕，用來切換 .active 樣式
         *
         * 邏輯：非 'all' 時，不符合 cat 的 .recipe-item 加上 .is-hidden 隱藏
         */
        function filterMenu(cat, btn) {
            // 清除所有按鈕的 active，再標記目前選中的
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            document.querySelectorAll('.recipe-item').forEach(item => {
                item.classList.toggle('is-hidden', cat !== 'all' && !item.classList.contains(cat));
            });
        }

        /* 鍵盤快捷：彈窗開啟時按 Esc 也可關閉 */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('show')) closeRecipe();
        });

        /* 頁面載入完成後立即渲染所有食譜卡片 */
        renderRecipes();
    </script>
</body>
